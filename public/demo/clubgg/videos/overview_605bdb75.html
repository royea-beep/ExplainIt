  .viewport-scaler {
    width: 1080px;
    height: 1920px;

    position: relative;
    overflow: hidden;

  /* Title */
  .title-overlay {

    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: rgba(13, 13, 26, 0.88);
    animation: titleFade 28s ease-in-out forwards;

  @keyframes titleFade {
    0% { opacity: 1; }
    6.142857142857142% { opacity: 1; }
    7.142857142857142% { opacity: 0; pointer-events: none; }
    100% { opacity: 0; pointer-events: none; }

  .title-overlay h1 { font-size: 48px; color: #ffffff; margin-bottom: 12px; text-align: center; }
  .title-overlay p { font-size: 22px; color: #cccccc; text-align: center; }

  /* Screen slides */
  .screen-slide {
    position: absolute; z-index: 5;
    top: 5%; left: 5%; width: 90%; height: 75%;
    opacity: 0;

  .screen-slide img {
    width: 100%; height: 100%;
