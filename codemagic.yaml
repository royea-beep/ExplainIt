workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.explainit.app
      vars:
        XCODE_SCHEME: "App"
        # Set APP_STORE_APP_ID in Codemagic UI (App settings → Environment variables)
        # It's the numeric Apple ID from App Store Connect → your app → General
        # Required for auto-incrementing build numbers
        # APP_STORE_APP_ID: "set_in_codemagic_ui"
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Prepare webDir for Capacitor
        script: |
          # Capacitor requires webDir to exist even in remote URL mode
          mkdir -p out
          echo '<html><body>Remote mode</body></html>' > out/index.html
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST_BUILD + 1))
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcodeproj/project.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - royearguan@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
